---
- name: Bootstrap the Ansible control node
  hosts: tag_ansible_control
  become: true
  gather_facts: true

  tasks:
    - name: Install base packages
      ansible.builtin.dnf:
        name:
          - git
          - python3
          - python3-pip
          - python3-packaging
        state: present

    - name: Install Ansible + collections via pip
      ansible.builtin.pip:
        name:
          - ansible
          - boto3
          - botocore
        extra_args: --break-system-packages

    - name: Install Terraform repo
      ansible.builtin.get_url:
        url: https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
        dest: /etc/yum.repos.d/hashicorp.repo

    - name: Install Terraform
      ansible.builtin.dnf:
        name: terraform
        state: present

    - name: Install Helm
      ansible.builtin.shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      environment:
        PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
      args:
        creates: /usr/local/bin/helm

    - name: Install kubectl
      ansible.builtin.shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      args:
        creates: /usr/local/bin/kubectl

    - name: Clone the project repo
      ansible.builtin.git:
        repo: https://github.com/NathanDonPierce/binance-ws-md-aws
        dest: /home/ec2-user/binance-ws
        version: main
      become: false
