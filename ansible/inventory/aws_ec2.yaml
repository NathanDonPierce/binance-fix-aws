plugin: amazon.aws.aws_ec2
regions:
  - ap-northeast-1
filters:
  tag:Project: ws-project
  instance-state-name: running
keyed_groups:
  - key: tags.Name
    prefix: tag
  - key: tags.Role
    prefix: tag
compose:
  ansible_host: "(tags.Role == 'ws-client') | ternary(private_ip_address, public_ip_address)"
